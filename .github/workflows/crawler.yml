name: Hot News Crawler

on:
  schedule:
    - cron: "*/10 * * * *"  # 每10分钟运行一次（UTC时间，GitHub只认这个）
  workflow_dispatch:        # 保留手动触发

permissions:
  contents: write            # 权限正确

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10      # 防止任务卡死，超时自动终止

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # 提升版本更稳定

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Check config files
        run: |
          ls -la config/
          test -f config/config.yaml || exit 1
          test -f config/frequency_words.txt || exit 1

      - name: Run crawler
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          TZ: Asia/Shanghai
        run: python main.py

      - name: Push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || { git commit -m "Auto update $(date +'%Y-%m-%d %H:%M:%S')" && git push; }
